# Render部署配置 - 修复版
services:
  - type: web
    name: secondlife-api
    runtime: python
    repo: https://github.com/oceanli703-crypto/secondlife-platform
    branch: main
    buildCommand: |
      cd backend
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./secondlife.db
    plan: free
    healthCheckPath: /health
