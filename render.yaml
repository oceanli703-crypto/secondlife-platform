# Render Docker部署配置
services:
  - type: web
    name: secondlife-api
    runtime: docker
    repo: https://github.com/oceanli703-crypto/secondlife-platform
    branch: main
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./secondlife.db
    plan: free
    healthCheckPath: /health
