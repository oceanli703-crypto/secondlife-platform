# Render部署配置
services:
  - type: web
    name: secondlife-api
    runtime: python
    repo: https://github.com/oceanli703-crypto/secondlife-platform
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
    plan: free
